# ─────────────────────────────────────────────────────────────────────
# nginx_mundografic_site.conf
# Configuración completa de nginx para MundoGrafic con Blue/Green
#
# Cómo usar:
#   sudo cp backend/deploy/nginx_mundografic_site.conf \
#        /etc/nginx/sites-available/mundografic
#   sudo ln -s /etc/nginx/sites-available/mundografic \
#              /etc/nginx/sites-enabled/mundografic
#   sudo nginx -t && sudo systemctl reload nginx
#
# El upstream se controla con control-green.sh (opciones 4 y 5).
# El upstream vive en /etc/nginx/conf.d/mundografic_upstream.conf
# y es regenerado automáticamente por el script.
#
# Para que funcione el upstream, primero genera el archivo:
#   sudo bash scripts/control-green.sh   → opción 5 (apuntar a blue)
# ─────────────────────────────────────────────────────────────────────

# ── Upstream (generado por control-green.sh) ─────────────────────────
# Incluido desde /etc/nginx/conf.d/mundografic_upstream.conf
# No edites ese archivo manualmente: usa el script de control.

server {
    listen 80;
    server_name _;                 # reemplaza por tu dominio si tienes uno

    # ── Frontend (dist compilado) ───────────────────────────────────
    root /var/www/mundografic;
    index index.html;

    # SPA: todas las rutas no encontradas van al index.html de React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Backend (Blue/Green — controlado por upstream) ──────────
    location /api/ {
        proxy_pass         http://mundografic_backends;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Archivos de storage (firmas, PDFs, uploads) ─────────────────
    location /storage/ {
        proxy_pass http://mundografic_backends;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://mundografic_backends;
        proxy_set_header Host $host;
    }

    # ── Acceso directo a la instancia GREEN para pruebas ────────────
    # Puedes acceder a staging directamente por puerto sin cambiar nginx:
    #   http://<servidor>:4001/api/...
    # Sin necesidad de este bloque — el backend green escucha en :4001
    # y está accesible directamente (asegúrate de que el firewall lo permite).

    # ── Logs ────────────────────────────────────────────────────────
    access_log /var/log/nginx/mundografic_access.log;
    error_log  /var/log/nginx/mundografic_error.log;
}
